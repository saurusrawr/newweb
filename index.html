<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        /* CSS Untuk Menghilangkan Bingkai dan Full Screen */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Mencegah scrollbar muncul */
            background-color: #000;
        }

        /* Tampilan Webview (Iframe) */
        #webview-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: none; /* Defaultnya disembunyikan dulu */
        }

        /* Tampilan Maintenance / Error */
        #maintenance-screen {
            display: none;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            color: #ff4444;
            font-family: 'Courier New', Courier, monospace;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        p {
            color: #888;
        }

        /* Loader Animation */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Tempat Menampilkan Web Asli -->
    <iframe id="webview-frame"></iframe>

    <!-- Tempat Menampilkan Maintenance / Error -->
    <div id="maintenance-screen">
        <div class="loader" id="loader-icon"></div>
        <h1 id="status-title">MAINTENANCE SERVER</h1>
        <p id="status-msg">Server sedang dalam perbaikan atau tidak dapat diakses.</p>
    </div>

    <script>
        // Konfigurasi
        const JSON_URL = "https://raw.githubusercontent.com/saurusrawr/saurusdb/main/tokensdb.json";
        
        // Elemen HTML
        const frame = document.getElementById('webview-frame');
        const maintenanceScreen = document.getElementById('maintenance-screen');
        const statusTitle = document.getElementById('status-title');
        const statusMsg = document.getElementById('status-msg');

        // Fungsi untuk menampilkan layar error/maintenance
        function showMaintenance(title = "MAINTENANCE SERVER", msg = "Silakan coba lagi nanti.") {
            frame.style.display = 'none';
            maintenanceScreen.style.display = 'flex';
            statusTitle.innerText = title;
            statusMsg.innerText = msg;
        }

        // Fungsi untuk memuat web asli
        function loadWeb(url) {
            // Timeout untuk mendeteksi error koneksi (misal网站的 tidak reachable)
            const timeout = 5000; // 5 detik
            
            // Coba test koneksi sederhana (ping)
            // Catatan: Karena CORS, kita tidak bisa sepenuhnya cek error detail,
            // tapi kita akan coba Render iframe saja. 
            // Jika blank dalam waktu lama, dianggap error.
            
            frame.src = url;
            frame.style.display = 'block';
            maintenanceScreen.style.display = 'none';

            // Monitoring jika Iframe error (umum terjadi jika koneksi buruk)
            frame.onerror = function() {
                showMaintenance("CONNECTION LOST", "Tidak dapat mengakses server target.");
            };
        }

        // Mulai Eksekusi
        async function init() {
            try {
                // 1. Ambil Data dari GitHub
                const response = await fetch(JSON_URL);
                
                if (!response.ok) {
                    throw new Error("Gagal mengambil data dari database.");
                }

                const data = await response.json();

                // Validasi Secret (Opsional, jika mau dicek)
                // console.log("Secret:", data.secret);

                const targetUrl = data.panel_url;

                // 2. Cek Logic Maintenance
                if (!targetUrl || targetUrl === "-" || targetUrl.trim() === "") {
                    showMaintenance();
                    return;
                }

                // 3. Coba Muat URL
                // Kita coba fetch dulu untuk memastikan URL hidup (CORS aware)
                // Jika ini gagal (cross-origin block), kita tetap coba load iframe
                try {
                    await fetch(targetUrl, { method: 'HEAD', mode: 'no-cors' }); 
                    //注: mode 'no-cors' berarti kita tidak tau sukses/gagal, hanya memastikan ada回应.
                    //Jika ini ingin aman, langsung saja loadWeb(targetUrl);
                } catch (e) {
                    // Abaikan error fetch di sini, karena kita akan rely pada iframe untuk menampilkan webnya.
                }

                loadWeb(targetUrl);

            } catch (error) {
                console.error(error);
                // Jika Gagal ambil JSON dari GitHub (Misal internet putus)
                showMaintenance("DATABASE ERROR", "Tidak dapat memuat konfigurasi sistem.");
            }
        }

        // Jalankan fungsi saat halaman dimuat
        init();

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading System...</title>
    <style>
        /* Tampilan Default (Akan muncul jika ada masalah) */
        body {
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
            background-color: #f0f0f0;
            color: #333;
            text-align: center;
        }

        /* Iframe (Tampilan Web Asli) */
        #webview-frame {
            display: none; /* Defaultnya disembunyikan */
            width: 100vw;
            height: 100vh;
            border: none;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* Loading / Maintenance Text */
        #status-screen {
            padding: 20px;
            border: 1px solid #ccc;
            background: white;
            max-width: 600px;
            margin: 50px auto;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .error { color: red; font-weight: bold; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- 1. Layar Status (Loading / Maintenance / Error) -->
    <div id="status-screen">
        <div class="loader" id="loader"></div>
        <h2 id="title">Memuat Konfigurasi...</h2>
        <p id="message">Mohon tunggu sebentar.</p>
    </div>

    <!-- 2. Layar Web Asli (Iframe) -->
    <iframe id="webview-frame"></iframe>

    <script>
        // --- KONFIGURASI ---
        const JSON_URL = "https://raw.githubusercontent.com/saurusrawr/saurusdb/main/tokensdb.json";
        
        const ui = {
            screen: document.getElementById('status-screen'),
            frame: document.getElementById('webview-frame'),
            title: document.getElementById('title'),
            msg: document.getElementById('message'),
            loader: document.getElementById('loader')
        };

        // Fungsi Tampilkan Maintenance / Error
        function showStatus(title, msg, isError = false) {
            ui.frame.style.display = 'none';
            ui.screen.style.display = 'block';
            ui.title.innerText = title;
            ui.title.className = isError ? 'error' : '';
            ui.msg.innerText = msg;
            ui.loader.style.display = 'none'; // Hilangkan loader
        }

        // Fungsi Load Web
        function loadWeb(url) {
            ui.frame.style.display = 'block';
            ui.screen.style.display = 'none';
            ui.frame.src = url;

            // Deteksi jika web gagal dimuat (kosong/blank) dalam 5 detik
            setTimeout(() => {
                try {
                    // Cek apakah iframe kosong (berarti error karena weblock iframe)
                    if (!ui.frame.contentWindow || ui.frame.contentWindow.length === 0) {
                        // Biasa terjadi jika web target blokir iframe
                        showStatus("GAGAL MEMUAT", "Web target memblokir tampilan (X-Frame-Options) atau sedang offline.", true);
                    }
                } catch (e) {
                    // Cross-origin error, biarkan saja (biasanya web berjalan di latar)
                }
            }, 4000);
        }

        // --- EKSEKUSI UTAMA ---
        fetch(JSON_URL)
            .then(response => {
                if (!response.ok) throw new Error("File JSON tidak ditemukan");
                return response.json();
            })
            .then(data => {
                const url = data.panel_url;
                const secret = data.secret; // Dicek dikit ya, tapi tidak dipakai

                console.log("Data Diterima:", url);

                // CEK 1: Apakah URL "-" ?
                if (!url || url === "-" || url.trim() === "") {
                    showStatus("MAINTENANCE", "Server sedang dalam perawatan.");
                    return;
                }

                // CEK 2: Load Web
                loadWeb(url);
            })
            .catch(error => {
                console.error(error);
                // Error bisa karena CORS (Local file) atau Internet
                showStatus("GAGAL KONEKSI", "Tidak bisa mengambil data konfigurasi. Pastikan Anda membuka ini via Server/Hosting, bukan klik langsung file (file://). Error: " + error.message, true);
            });
    </script>
</body>
</html>

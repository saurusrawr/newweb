<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uploadersaurus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      background: #16213e;
      padding: 2rem;
      border-radius: 12px;
      width: 90%;
      max-width: 450px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 { text-align: center; color: #00d4ff; margin-bottom: 1.5rem; }
    .dropzone {
      border: 2px dashed #333;
      border-radius: 8px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .dropzone:hover { border-color: #00d4ff; background: rgba(0,212,255,0.05); }
    .dropzone.dragover { border-color: #00d4ff; background: rgba(0,212,255,0.1); }
    .btn {
      background: #00d4ff;
      color: #000;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-top: 1rem;
    }
    .btn:disabled { background: #555; cursor: not-allowed; }
    #result {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #0f3460;
      border-radius: 6px;
      display: none;
    }
    #result.show { display: block; }
    #result a { color: #00d4ff; word-break: break-all; }
    .error { color: #ff6b6b; text-align: center; margin-top: 1rem; display: none; }
    .error.show { display: block; }
    .loading { display: none; text-align: center; margin-top: 1rem; }
    .loading.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🦖 Uploadersaurus</h1>
    <div class="dropzone" id="dropzone">
      <p>Klik atau drag file di sini</p>
      <small style="color: #666">js, png, jpg, mp4, mp3, zip, dll</small>
    </div>
    <input type="file" id="fileInput" hidden>
    <button class="btn" id="uploadBtn" onclick="upload()">Upload</button>
    <div class="loading" id="loading">Uploading...</div>
    <div class="error" id="error"></div>
    <div id="result">
      <p style="color: #4ade80; margin-bottom: 0.5rem">✅ Berhasil!</p>
      <a id="link" href="" target="_blank"></a>
    </div>
  </div>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    let file = null;

    dropzone.onclick = () => fileInput.click();
    
    dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add('dragover'); };
    dropzone.ondragleave = () => dropzone.classList.remove('dragover');
    dropzone.ondrop = (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) {
        file = e.dataTransfer.files[0];
        dropzone.querySelector('p').textContent = file.name;
      }
    };

    fileInput.onchange = () => {
      if (fileInput.files[0]) {
        file = fileInput.files[0];
        dropzone.querySelector('p').textContent = file.name;
      }
    };

    async function upload() {
      if (!file) return showError('Pilih file dulu!');
      
      showLoading();
      hideError();
      document.getElementById('result').classList.remove('show');

      const fd = new FormData();
      fd.append('file', file);

      try {
        const res = await fetch('/uploader', { method: 'POST', body: fd });
        const data = await res.json();

        if (!data.status) throw new Error(data.message);
        
        const link = document.getElementById('link');
        link.href = data.result.link;
        link.textContent = data.result.link;
        document.getElementById('result').classList.add('show');
        
        file = null;
        dropzone.querySelector('p').textContent = 'Klik atau drag file di sini';
        fileInput.value = '';
      } catch (e) {
        showError(e.message);
      } finally {
        hideLoading();
      }
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.classList.add('show');
    }
    function hideError() { document.getElementById('error').classList.remove('show'); }
    function showLoading() { document.getElementById('loading').classList.add('show'); document.getElementById('uploadBtn').disabled = true; }
    function hideLoading() { document.getElementById('loading').classList.remove('show'); document.getElementById('uploadBtn').disabled = false; }
  </script>
</body>
</html>
